services:
  - type: web
    name: mcp-legal-chile
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
