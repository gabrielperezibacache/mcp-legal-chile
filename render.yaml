services:
  - type: web
    name: mcp-legal-chile
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: HOST
        value: "0.0.0.0"
      - key: WARMUP_ON_BOOT
        value: "1"

  - type: cron
    name: mcp-legal-keepalive
    runtime: node
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: "echo ok"
    startCommand: >-
      node -e "fetch('https://mcp-legal-chile.onrender.com/warmup').then(r=>r.json()).then(j=>console.log(JSON.stringify(j))).catch(e=>{console.error(e);process.exit(0)})"
    envVars:
      - key: NODE_VERSION
        value: "20"
